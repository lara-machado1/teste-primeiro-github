<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFE+ | Avaliação Física Inclusiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grain-overlay"></div>

    <header class="main-header">
        <div class="container header-flex">
            <div class="brand">
                <span class="logo-dot"></span>
                <h1>SAFE<span>+</span></h1>
            </div>
            <nav class="nav-desktop">
                <ul>
                    <li><a href="#selecao">Protocolos</a></li>
                    <li><a href="#cadastro">Alunos</a></li>
                    <li><a href="#avaliacao" class="nav-cta">Motor de Avaliação</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="selecao" class="reveal">
            <div class="section-intro">
                <span class="eyebrow">Passo 01</span>
                <h2>Selecione o Protocolo</h2>
            </div>

            <div class="cards-wrapper">
                <div class="glass-card protocol-card" onclick="selecionar('Geral')">
                    <div class="card-icon blue-glow">G</div>
                    <h3>Escolares Geral</h3>
                    <p>PROESP-BR <br><span>7 a 17 anos</span></p>
                    <button class="btn-card">Selecionar</button>
                </div>

                <div class="glass-card protocol-card active-turquesa" onclick="selecionar('DV')">
                    <div class="card-icon turquesa-glow">DV</div>
                    <h3>Def. Visual</h3>
                    <p>BAF-DV <br><span>7 a 25 anos</span></p>
                    <button class="btn-card">Selecionar</button>
                </div>

                <div class="glass-card protocol-card" onclick="selecionar('SD')">
                    <div class="card-icon navy-glow">SD</div>
                    <h3>Síd. de Down</h3>
                    <p>PRODOWN <br><span>10 a 20 anos</span></p>
                    <button class="btn-card">Selecionar</button>
                </div>
            </div>
        </section>

        <section id="cadastro" class="reveal">
            <div class="section-intro">
                <span class="eyebrow
